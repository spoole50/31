version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      # Allow the React dev server to call the API
      - FRONTEND_URL=http://localhost:3000
    # Uncomment to persist nothing (in-memory is default)
    # volumes:
    #   - ./backend:/app   # hot-reload during dev (optional)

  # Frontend runs outside Docker for fast hot-reload:
  #   cd frontend && npm start
  # If you want the frontend containerised too, uncomment below:
  #
  # frontend:
  #   image: node:20-alpine
  #   working_dir: /app
  #   volumes:
  #     - ./frontend:/app
  #     - /app/node_modules
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     - REACT_APP_API_URL=http://localhost:8000
  #   command: sh -c "npm install && npm start"
  #   depends_on:
  #     - backend
